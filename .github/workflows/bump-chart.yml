# Opens a PR in OpenHands/OpenHands-Cloud pointing the openhands chart's
# image.tag at the enterprise-server image for this tag. Triggered by
# "Tag Docker images" completing (rather than the tag push itself) so the
# chart PR only opens once the image tag actually resolves.
name: Bump chart image tag

on:
  workflow_run:
    workflows: ["Tag Docker images"]
    types: [completed]

jobs:
  bump-chart:
    # "Tag Docker images" only runs on tag pushes, and workflow_run's
    # head_branch carries the tag name for tag-triggered runs. Match the
    # cloud line here rather than with a trigger-level `branches:` glob —
    # whether that filter applies to tag-named head_branch values is
    # undocumented, and a non-match would silently skip the chart bump.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'cloud-')
    # secrets: inherit forwards the org secrets RELEASE_APP_ID /
    # RELEASE_APP_PRIVATE_KEY that the reusable workflow needs.
    secrets: inherit
    uses: OpenHands/OpenHands-Cloud/.github/workflows/bump-image-tag.yml@main
    with:
      component: openhands
      chart_file: charts/openhands/values.yaml
      metadata_file: charts/openhands/Chart.yaml
      metadata_path: .appVersion
      tag: ${{ github.event.workflow_run.head_branch }}
